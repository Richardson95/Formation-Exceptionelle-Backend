# Render blueprint for the Formation Exceptionelle API.
# Create the service from this file, then set the secret env vars in the
# Render dashboard (marked sync:false below).
services:
  - type: web
    name: formation-exceptionelle-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      # Secrets — set these in the Render dashboard.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: PAYMENT_PROVIDER
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: VIDEO_PROVIDER
        sync: false
      - key: BUNNY_STREAM_LIBRARY_ID
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: BUNNY_STREAM_CDN
        sync: false
      - key: STORAGE_DRIVER
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: MAIL_TRANSPORT
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
