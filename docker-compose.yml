# Local full-stack: API + MongoDB. For production use MongoDB Atlas instead.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/formation_exceptionelle
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
      # Real providers activate when you supply their keys here or via .env.
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      BUNNY_STREAM_LIBRARY_ID: ${BUNNY_STREAM_LIBRARY_ID:-}
      BUNNY_STREAM_API_KEY: ${BUNNY_STREAM_API_KEY:-}
      BUNNY_STREAM_CDN: ${BUNNY_STREAM_CDN:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

volumes:
  mongo_data:
